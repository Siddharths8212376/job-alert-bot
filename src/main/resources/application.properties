# ==========================================
# Application Configuration
# ==========================================
spring.application.name=job-alert-bot
server.port=${PORT}

# ==========================================
# Database Configuration (PostgreSQL)
# ==========================================
spring.datasource.url=
spring.datasource.username=
spring.datasource.password=
spring.jpa.properties.hibernate.default_schema=job_alert_bot
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1

# ==========================================
# JPA / Hibernate Configuration
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=100
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ==========================================
# Email Configuration (Gmail SMTP Example)
# ==========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ==========================================
# Custom Application Properties
# ==========================================
app.email.from=
app.email.to=

# ==========================================
# Job Search Criteria
# ==========================================

# Job titles to include
app.criteria.titles=

# Preferred locations
app.criteria.locations=

# Experience range (years)
app.criteria.min-experience=
app.criteria.max-experience=

# Required skills
app.criteria.required-skills=

# Excluded keywords
app.criteria.excluded-keywords=

# Minimum relevance score required to send notification
app.criteria.minimum-score=

# ==========================================
# Scheduler Configuration
# Cron format: second minute hour day month weekday
# Example below runs every day at 8:00 AM
# ==========================================
app.scheduler.cron=0 0 8 * * *

# ==========================================
# Logging
# ==========================================
logging.level.root=INFO
logging.level.com.example.jobalertbot=DEBUG


# ==========================================
# Company Specific Properties
# ==========================================

# ======
# Oracle
# ======
app.oracle.base-api-url=https://eeho.fa.us2.oraclecloud.com/hcmRestApi/resources/latest/recruitingCEJobRequisitions
app.oracle.job-detail-base=https://eeho.fa.us2.oraclecloud.com/hcmUI/CandidateExperience/en/sites/CX_45001/job/
app.oracle.company-name=Oracle
app.oracle.selected-category-facet=300000001917356
app.oracle.site-number=CX_45001

# ======
# JPMC
# ======
app.jpmc.base-api-url=https://jpmc.fa.oraclecloud.com/hcmRestApi/resources/latest/recruitingCEJobRequisitions
app.jpmc.job-detail-base=https://jpmc.fa.oraclecloud.com/hcmUI/CandidateExperience/en/sites/CX_1001/job/
app.jpmc.company-name=JPMC
app.jpmc.selected-category-facet=300000086152753
app.jpmc.site-number=CX_1001
